<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="authGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="authGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F62FE;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:0.05" />
    </linearGradient>
    <pattern id="dots" x="50" y="50" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="3" fill="#0F62FE" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Main gradient background -->
  <rect width="1920" height="1080" fill="url(#authGrad1)"/>
  
  <!-- Animated geometric shapes -->
  <circle cx="1700" cy="200" r="200" fill="#0F62FE" opacity="0.08"/>
  <circle cx="200" cy="900" r="150" fill="#0D47A1" opacity="0.08"/>
  <circle cx="950" cy="500" r="100" fill="#FFB300" opacity="0.06"/>
  
  <!-- Stripe pattern -->
  <rect width="1920" height="1080" fill="url(#authGrad2)"/>
  
  <!-- Grid pattern for tech feel -->
  <g stroke="#0F62FE" stroke-width="1" opacity="0.05">
    <line x1="0" y1="0" x2="1920" y2="1080"/>
    <line x1="1920" y1="0" x2="0" y2="1080"/>
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>
  
  <!-- Dots pattern -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  
  <!-- Accent lines -->
  <line x1="0" y1="0" x2="300" y2="0" stroke="#FFB300" stroke-width="3" opacity="0.2"/>
  <line x1="1920" y1="1080" x2="1620" y2="1080" stroke="#FFB300" stroke-width="3" opacity="0.2"/>
</svg>