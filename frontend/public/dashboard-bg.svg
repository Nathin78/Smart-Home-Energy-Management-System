<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dashGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dashGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F62FE;stop-opacity:0.03" />
      <stop offset="100%" style="stop-color:#FFB300;stop-opacity:0.03" />
    </linearGradient>
    <pattern id="grid" x="40" y="40" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#0F62FE" stroke-width="1" opacity="0.08"/>
    </pattern>
    <pattern id="hexagon" x="100" y="100" width="200" height="173.2" patternUnits="userSpaceOnUse">
      <path d="M 50,0 L 100,28.87 L 100,86.60 L 50,115.47 L 0,86.60 L 0,28.87 Z" fill="none" stroke="#0D47A1" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Main gradient -->
  <rect width="1920" height="1080" fill="url(#dashGrad1)"/>
  
  <!-- Grid pattern for data theme -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Hexagon pattern for tech feel -->
  <rect width="1920" height="1080" fill="url(#hexagon)"/>
  
  <!-- Gradient overlay -->
  <rect width="1920" height="1080" fill="url(#dashGrad2)"/>
  
  <!-- Energy-themed circles (representing data/power) -->
  <circle cx="100" cy="100" r="80" fill="#0F62FE" opacity="0.06"/>
  <circle cx="100" cy="100" r="50" fill="#0F62FE" opacity="0.08"/>
  <circle cx="100" cy="100" r="20" fill="#FFB300" opacity="0.15"/>
  
  <circle cx="1800" cy="900" r="120" fill="#0D47A1" opacity="0.05"/>
  <circle cx="1800" cy="900" r="70" fill="#0D47A1" opacity="0.07"/>
  
  <circle cx="950" cy="600" r="100" fill="#137333" opacity="0.04"/>
  
  <!-- Data visualization lines -->
  <g stroke="#0F62FE" stroke-width="2" opacity="0.08">
    <path d="M 0 600 Q 480 400 960 500 T 1920 450"/>
    <path d="M 0 700 Q 480 500 960 600 T 1920 550"/>
  </g>
  
  <!-- Accent elements -->
  <rect x="0" y="0" width="5" height="200" fill="#FFB300" opacity="0.15"/>
  <rect x="1915" y="880" width="5" height="200" fill="#FFB300" opacity="0.15"/>
  
  <!-- Corner accents -->
  <g stroke="#0F62FE" stroke-width="1" opacity="0.12" fill="none">
    <rect x="50" y="50" width="200" height="200" rx="10"/>
    <rect x="1670" y="830" width="200" height="200" rx="10"/>
  </g>
</svg>