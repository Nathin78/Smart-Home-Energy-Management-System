# Server Configuration
server.port=${SHEMS_PORT:8080}
server.servlet.context-path=/api

# H2 Database Configuration (file-based)
spring.datasource.url=jdbc:h2:file:./shems_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# SQL initialization - execute schema first, then data
spring.sql.init.mode=never
# SQL scripts are initialized by the application code (DataInitializer)
# spring.sql.init.schema-locations=classpath:schema.sql
# spring.sql.init.data-locations=classpath:data.sql

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=DEBUG
logging.level.com.shems=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SHEMS_MAIL_USERNAME:}
spring.mail.password=${SHEMS_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

