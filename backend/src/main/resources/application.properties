# Server Configuration
server.port=${SHEMS_PORT:8080}
server.servlet.context-path=/api

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shems_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Nathin@1

# H2 Console (disabled when using MySQL)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# SQL initialization - execute schema first, then data
spring.sql.init.mode=never
# SQL scripts are initialized by the application code (DataInitializer)
# spring.sql.init.schema-locations=classpath:schema.sql
# spring.sql.init.data-locations=classpath:data.sql

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=DEBUG
logging.level.com.shems=DEBUG
logging.level.org.hibernate.SQL=INFO

